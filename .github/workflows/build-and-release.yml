name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build extension
        run: npm run build
        env:
          API_URL: https://allch.at

      - name: Package extension
        run: npm run package

      - name: Get version from manifest
        id: get_version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: allchat-extension-${{ steps.get_version.outputs.version }}
          path: allchat-extension.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package
        env:
          API_URL: https://allch.at

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:'- %s' HEAD)
          else
            COMMITS=$(git log --pretty=format:'- %s' "${PREV_TAG}..HEAD")
          fi
          # Filter out version bump commits
          CHANGELOG=$(echo "$COMMITS" | grep -v '^- chore:' || true)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Minor improvements and bug fixes"
          fi

          cat > /tmp/release-notes.md << NOTES
          ## All-Chat Browser Extension ${VERSION}

          ### Changelog

          ${CHANGELOG}

          ### Installation

          #### Install from Store (Recommended)
          - **Chrome / Edge / Brave:** [Chrome Web Store](https://chromewebstore.google.com/detail/all-chat-extension/ioneembbnocfljgbhgfknbbnpfeadacm)
          - **Firefox:** [Firefox Add-ons](https://addons.mozilla.org/en-US/firefox/addon/all-chat-extension/)

          #### Manual Installation
          1. Download \`allchat-extension.zip\` below
          2. Unzip the file
          3. Open Chrome/Edge and go to \`chrome://extensions/\` or \`edge://extensions/\`
          4. Enable "Developer mode" (toggle in top-right)
          5. Click "Load unpacked"
          6. Select the unzipped folder

          ---

          **Note:** Store versions may take a few days to update. For the latest version immediately, use the manual installation above.
          NOTES
          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' /tmp/release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: allchat-extension.zip
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

