<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kaicenat - Kick</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', Arial, sans-serif;
      background: #0c0c0e;
      color: #efeff1;
    }
    .kick-header {
      display: flex;
      align-items: center;
      height: 48px;
      background: #111112;
      padding: 0 16px;
      border-bottom: 1px solid #1a1a1c;
    }
    .kick-layout {
      display: flex;
      height: calc(100vh - 48px);
    }
    .stream-container {
      flex: 1;
      background: #0c0c0e;
      padding: 20px;
    }
    .right-column {
      width: 340px;
      background: #111112;
      border-left: 1px solid #1a1a1c;
    }
    .video-player {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stream-info {
      padding: 12px 0;
    }
    .live-badge {
      background: #53fc18;
      color: #0c0c0e;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #channel-chatroom {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #chatroom {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .chatroom-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-messages {
      flex: 1;
      padding: 8px;
    }
    .chat-input {
      padding: 8px;
      border-top: 1px solid #1a1a1c;
    }
  </style>
</head>
<body>
  <header class="kick-header">
    <span>Kick</span>
    <span data-state="live" class="live-badge" style="margin-left: 12px;">LIVE</span>
    <span style="margin-left: 8px;">kaicenat</span>
  </header>

  <div class="kick-layout">
    <div class="stream-container">
      <div class="video-player">
        <h1 style="color: #efeff1;">Mock Kick Stream - kaicenat</h1>
      </div>
      <div class="stream-info">
        <h2>Test Stream Title</h2>
        <p>kaicenat</p>
      </div>
    </div>
    <div class="right-column">
      <!-- Primary chat slot: #channel-chatroom -->
      <div id="channel-chatroom">
        <!-- Fallback 1: #chatroom (nested inside primary) -->
        <div id="chatroom">
          <!-- Fallback 2: .chatroom-wrapper (nested inside #chatroom) -->
          <div class="chatroom-wrapper">
            <div class="chat-messages">
              <p>Welcome to the stream!</p>
            </div>
            <div class="chat-input">
              <input type="text" placeholder="Send a message" style="width:100%;background:#1a1a1c;color:#efeff1;border:none;padding:8px;border-radius:4px;" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Kick-like window properties for detection
    window.__kickChannel = 'kaicenat';
  </script>
</body>
</html>
