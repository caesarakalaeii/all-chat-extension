<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Twitch Stream</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0e0e10;
      color: #efeff1;
    }
    .community-points-summary {
      padding: 8px;
      background: #1f1f23;
      border-top: 1px solid #2c2c34;
      font-size: 13px;
    }
    .prediction-checkout-widget {
      padding: 8px;
      background: #1f1f23;
      border-bottom: 1px solid #2c2c34;
      font-size: 13px;
    }
    .twitch-layout {
      display: flex;
      height: 100vh;
    }
    .stream-container {
      flex: 1;
      background: #18181b;
      padding: 20px;
    }
    .right-column {
      width: 340px;
      background: #1f1f23;
    }
    .stream-chat {
      height: 100%;
      padding: 10px;
    }
    .chat-room {
      border: 1px solid #2c2c34;
      border-radius: 4px;
      padding: 10px;
    }
    .video-player {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="twitch-layout">
    <div class="stream-container">
      <div class="video-player">
        <h1>Mock Twitch Stream - teststreamer</h1>
      </div>
      <div class="stream-info">
        <h2>Test Stream Title</h2>
        <p>teststreamer</p>
      </div>
    </div>
    <div class="right-column">
      <div class="chat-shell" style="width:100%;height:100%;">
        <!-- Mock Twitch prediction widget (transient) — 2026-04 selectors -->
        <div class="prediction-checkout-widget" data-test-selector="community-prediction-highlight-header" id="mock-prediction-widget" style="display: none;">
          <div data-test-selector="community-prediction-highlight-header-title">Who will win?</div>
          <div class="prediction-options">
            <button data-test-selector="predictions-list-item__title">Option A</button>
            <button data-test-selector="predictions-list-item__title">Option B</button>
          </div>
        </div>
        <div class="stream-chat">
          <div class="chat-room">
            <h3>Stream Chat</h3>
            <div id="chat-messages"><p>Welcome to the chat!</p></div>
          </div>
        </div>
        <!-- Mock Twitch channel points widget (persistent) — 2026-04 selectors -->
        <div class="community-points-summary" data-test-selector="community-points-summary">
          <div class="community-points-summary__content">
            <span data-test-selector="copo-balance-string">12,450</span>
            <button data-test-selector="community-points-summary__claim-button" class="tw-button">Claim Bonus</button>
          </div>
        </div>
      </div>
    </div>
  </div>


</body>
</html>
